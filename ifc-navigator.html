<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFC Navigator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@400;700;800&display=swap');
:root{--bg:#07090f;--panel:#0c1018;--border:#161e2c;--border2:#1e2d42;--text:#7a9ab8;--text-bright:#cde0f5;--dim:#283849;--c-center:#00e5ff;--c-parent:#7c4dff;--c-child:#00e676;--c-ifc:#ff4081;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'JetBrains Mono',monospace;color:var(--text);overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column;}
header{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--c-center);}
.logo span{color:var(--dim);}
.mode-tabs{display:flex;gap:3px;background:var(--bg);border:1px solid var(--border2);border-radius:4px;padding:2px;}
.mode-tab{padding:4px 12px;border-radius:3px;font-size:11px;cursor:pointer;color:var(--dim);border:none;background:transparent;font-family:'JetBrains Mono',monospace;transition:all 0.15s;}
.mode-tab.active{background:var(--c-center);color:#000;font-weight:600;}
.schema-select{background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 8px;border-radius:3px;outline:none;}
.schema-select:disabled{opacity:0.3;}
.drop-btn{padding:5px 12px;border:1px dashed var(--border2);border-radius:3px;font-size:11px;cursor:pointer;color:var(--dim);background:transparent;font-family:'JetBrains Mono',monospace;transition:all 0.2s;position:relative;}
.drop-btn:hover,.drop-btn.drag-over{border-color:var(--c-center);color:var(--c-center);}
.drop-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
#dropStatus{font-size:10px;color:var(--c-child);}
#modeLabel{font-size:10px;color:var(--c-ifc);display:none;}
#backBtn{background:transparent;border:1px solid var(--border2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;border-radius:3px;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
#backBtn:hover:not(:disabled){border-color:var(--c-center);color:var(--c-center);}
#backBtn:disabled{opacity:0.2;cursor:default;}
#breadcrumb{display:flex;align-items:center;gap:4px;flex:1;overflow:hidden;min-width:0;}
.crumb{font-size:11px;color:var(--text);cursor:pointer;white-space:nowrap;padding:3px 6px;border-radius:3px;transition:all 0.15s;}
.crumb:hover{color:var(--text-bright);}
.crumb.current{color:var(--c-center);}
.crumb-sep{color:var(--dim);font-size:10px;}
#searchWrap{position:relative;flex-shrink:0;}
#searchInput{background:var(--bg);border:1px solid var(--border2);color:var(--text-bright);padding:5px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;border-radius:3px;outline:none;width:170px;transition:border-color 0.2s;}
#searchInput:focus{border-color:var(--c-center);}
#searchInput::placeholder{color:var(--dim);}
#searchResults{position:absolute;top:100%;left:0;right:0;background:var(--panel);border:1px solid var(--border2);border-radius:3px;z-index:100;max-height:200px;overflow-y:auto;display:none;}
.search-item{padding:6px 10px;font-size:11px;cursor:pointer;border-bottom:1px solid var(--border);}
.search-item:hover{background:rgba(0,229,255,0.06);color:var(--c-center);}
.workspace{display:flex;flex:1;overflow:hidden;}
#graphWrap{flex:1;position:relative;overflow:hidden;}
#graphSvg{width:100%;height:100%;}
#nodeCount{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--dim);pointer-events:none;}
#detailPanel{width:270px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.dp-header{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg);}
.dp-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:2px;}
.dp-subtitle{font-size:10px;color:var(--dim);}
.dp-body{flex:1;overflow-y:auto;padding:12px 14px;}
.dp-section{margin-bottom:12px;}
.dp-section-title{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);font-weight:600;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid var(--border);}
.dp-section-body{font-size:11px;line-height:1.7;color:var(--text);}
.dp-link{display:inline-block;margin-top:8px;font-size:10px;color:var(--c-center);text-decoration:none;border:1px solid rgba(0,229,255,0.3);padding:3px 10px;border-radius:3px;}
.dp-link:hover{background:rgba(0,229,255,0.08);}
.instance-badge{display:inline-block;background:var(--c-ifc);color:#fff;padding:3px 10px;border-radius:3px;font-weight:700;font-size:11px;margin-bottom:10px;}
#legend{position:absolute;bottom:14px;right:14px;background:rgba(12,16,24,0.92);border:1px solid var(--border2);border-radius:4px;padding:10px 14px;font-size:10px;z-index:10;backdrop-filter:blur(8px);}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
#loading{position:absolute;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--dim);flex-direction:column;gap:12px;z-index:50;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--c-center);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.back-link{font-size:10px;color:var(--dim);text-decoration:none;padding:4px 8px;border:1px solid var(--border2,var(--border));border-radius:3px;transition:all 0.15s;white-space:nowrap;}
.back-link:hover{color:var(--accent,#00e5ff);border-color:var(--accent,#00e5ff);}
#togglePalette{position:absolute;top:60px;left:16px;z-index:20;background:rgba(11,15,24,0.92);border:1px solid var(--border2,var(--border));border-radius:3px;color:var(--dim,#5a7080);font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 8px;cursor:pointer;backdrop-filter:blur(8px);transition:all 0.15s;}
#togglePalette:hover{color:var(--accent,#00e5ff);border-color:var(--accent,#00e5ff);}
#controls.hidden{display:none!important;}
</style>
</head>
<body>
<header>
  <a class="back-link" href="index.html">← Accueil</a>
  <div class="logo">IFC<span>/</span>Nav</div>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabSchema" onclick="setMode('schema')">Schéma</button>
    <button class="mode-tab" id="tabIfc" onclick="setMode('ifc')">Fichier IFC</button>
  </div>
  <select class="schema-select" id="schemaSelect" onchange="onSchemaChange()">
    <option value="ifc2x3">IFC 2x3</option>
    <option value="ifc4">IFC 4</option>
    <option value="ifc4x3" selected>IFC 4.3</option>
  </select>
  <div class="drop-btn" id="dropZone">⬡ Ouvrir .ifc<input type="file" id="fileInput" accept=".ifc"></div>
  <div id="dropStatus"></div>
  <div id="modeLabel">◆ Mode IFC</div>
  <button id="backBtn" disabled onclick="goBack()">← Retour</button>
  <div id="breadcrumb"></div>
  <div id="searchWrap">
    <input type="text" id="searchInput" placeholder="Entité...">
    <div id="searchResults"></div>
  </div>
</header>
<div class="workspace">
  <div id="graphWrap">
    <svg id="graphSvg"></svg>
    <div id="nodeCount"></div>
    <div id="loading"><div class="spinner"></div>Chargement du schéma IFC...</div>
    <div id="legend">
      <div class="leg-row"><div class="leg-dot" style="background:var(--c-center)"></div>Nœud actif</div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--c-parent)"></div>Parent</div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--c-child)"></div>Enfants</div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--c-ifc)"></div>Présent IFC</div>
    </div>
  </div>
  <div id="detailPanel">
    <div class="dp-header">
      <div class="dp-title" id="dp-title" style="color:var(--c-center)">–</div>
      <div class="dp-subtitle" id="dp-subtitle"></div>
    </div>
    <div class="dp-body" id="dp-body"><div style="color:var(--dim);font-size:11px;margin-top:20px;text-align:center">Cliquer sur un nœud</div></div>
  </div>
</div>
<script>
const SCHEMA_URLS = {
  ifc2x3: 'schema-ifc2x3.json',
  ifc4:   'schema-ifc4.json',
  ifc4x3: 'schema-ifc4x3.json'
};
const schemaCache = {};

let mode = 'schema';
let currentSchema = 'ifc4x3';
let modelEntities = {};
let currentNode = null;
let history = [];
let byCode = {}, childrenMap = {};

const GROUPS = {product:'#00e5ff',relation:'#ff4081',property:'#76ff03',geometry:'#ff9100',material:'#e040fb',process:'#40c4ff',control:'#ffea00',other:'#455a64'};
const GROUP_LABELS = {product:'Produits',relation:'Relations',property:'Propriétés',geometry:'Géométrie',material:'Matériaux',process:'Processus',control:'Contrôle',other:'Autres'};

async function loadSchemaData(v) {
  if (schemaCache[v]) return schemaCache[v];
  showLoading(true);
  try {
    const resp = await fetch(SCHEMA_URLS[v]);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    schemaCache[v] = data;
    return data;
  } finally {
    showLoading(false);
  }
}

function showLoading(show) {
  document.getElementById('loading').style.display = show ? 'flex' : 'none';
}

function buildIndex(nodes) {
  byCode = {}; childrenMap = {};
  nodes.forEach(n => {
    byCode[n.id] = n;
    if (!childrenMap[n.id]) childrenMap[n.id] = [];
    if (n.parent) {
      if (!childrenMap[n.parent]) childrenMap[n.parent] = [];
      if (!childrenMap[n.parent].includes(n.id)) childrenMap[n.parent].push(n.id);
    }
  });
}

function getRoots() { return Object.values(byCode).filter(n => !n.parent || !byCode[n.parent]).map(n => n.id); }
function getStartNode() { const r = getRoots(); return r.includes('IfcRoot') ? 'IfcRoot' : r[0]; }

async function setMode(m) {
  mode = m;
  document.getElementById('tabSchema').classList.toggle('active', m === 'schema');
  document.getElementById('tabIfc').classList.toggle('active', m === 'ifc');
  document.getElementById('schemaSelect').disabled = m === 'ifc';
  document.getElementById('modeLabel').style.display = m === 'ifc' ? 'block' : 'none';
  if (m === 'schema') {
    await loadSchema(currentSchema);
  } else {
    if (!Object.keys(modelEntities).length) { alert('Charger un fichier IFC d\'abord.'); setMode('schema'); return; }
    await buildIfcMode();
  }
}

async function onSchemaChange() {
  currentSchema = document.getElementById('schemaSelect').value;
  if (mode === 'schema') await loadSchema(currentSchema);
}

async function loadSchema(v) {
  const nodes = await loadSchemaData(v);
  buildIndex(nodes);
  history = []; document.getElementById('backBtn').disabled = true;
  currentNode = getStartNode();
  renderGraph(currentNode); updateBreadcrumb();
}

async function buildIfcMode() {
  const ref = await loadSchemaData(currentSchema);
  const tmpByCode = {}; ref.forEach(n => tmpByCode[n.id] = n);
  const presentCodes = new Set(Object.keys(modelEntities));
  const keepCodes = new Set();
  presentCodes.forEach(code => { let cur = code; while (cur && tmpByCode[cur]) { keepCodes.add(cur); cur = tmpByCode[cur].parent; } });
  buildIndex(ref.filter(n => keepCodes.has(n.id)));
  history = []; document.getElementById('backBtn').disabled = true;
  currentNode = getStartNode();
  renderGraph(currentNode); updateBreadcrumb();
}

function nodeColor(d, role) {
  if (role === 'center') return '#00e5ff';
  if (role === 'parent') return '#7c4dff';
  if (modelEntities[d.id.toUpperCase()]) return '#ff4081';
  if (role === 'child') return GROUPS[d.group] || '#00e676';
  return '#455a64';
}

const svg = d3.select('#graphSvg');
const defs = svg.append('defs');
['center','child','parent'].forEach(t => {
  const f = defs.append('filter').attr('id','glow-'+t).attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
  f.append('feGaussianBlur').attr('stdDeviation', t==='center'?8:4).attr('result','blur');
  const m = f.append('feMerge'); m.append('feMergeNode').attr('in','blur'); m.append('feMergeNode').attr('in','SourceGraphic');
});
const mainG = svg.append('g');
const zoom = d3.zoom().scaleExtent([0.15,5]).on('zoom', e => mainG.attr('transform', e.transform));
svg.call(zoom);
let simulation;

function getRadius(d) { if(d.role==='center')return 26; if(d.role==='parent')return 17; return (childrenMap[d.id]||[]).length>0?13:9; }

function renderGraph(code) {
  const wrap = document.getElementById('graphWrap');
  const W = wrap.clientWidth, H = wrap.clientHeight, cx = W/2, cy = H/2;
  const n = byCode[code]; if (!n) return;
  const nodes = [{...n, role:'center'}];
  const links = [];
  if (n.parent && byCode[n.parent]) { nodes.push({...byCode[n.parent], role:'parent'}); links.push({source:n.parent,target:code,type:'parent'}); }
  (childrenMap[code]||[]).forEach(k => { if(byCode[k]){nodes.push({...byCode[k],role:'child'});links.push({source:code,target:k,type:'child'});} });
  nodes.forEach((d,i) => {
    if(d.role==='center'){d.x=cx;d.y=cy;d.fx=cx;d.fy=cy;}
    else if(d.role==='parent'){d.x=cx;d.y=cy-170;d.fx=cx;d.fy=cy-170;}
    else {
      const childNodes=nodes.filter(x=>x.role==='child');
      const idx=childNodes.indexOf(d); const total=childNodes.length;
      const angle=(idx/total)*2*Math.PI-Math.PI/2;
      const r=Math.min(W,H)*0.30;
      d.x=cx+Math.cos(angle)*r; d.y=cy+Math.sin(angle)*r;
    }
  });
  if(simulation) simulation.stop();
  mainG.selectAll('*').remove();
  document.getElementById('nodeCount').textContent = `${nodes.length} nœuds · ${links.length} liens`;
  simulation = d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(d=>d.type==='parent'?160:Math.max(90,Math.min(180,700/Math.max((childrenMap[code]||[]).length,1)))).strength(0.7))
    .force('charge',d3.forceManyBody().strength(d=>d.role==='center'?0:-180))
    .force('collision',d3.forceCollide().radius(d=>getRadius(d)+28))
    .alphaDecay(0.025).velocityDecay(0.45);
  const link = mainG.append('g').selectAll('line').data(links).join('line')
    .attr('stroke',d=>d.type==='parent'?'#261545':'#0d2518')
    .attr('stroke-width',d=>d.type==='parent'?1.5:1)
    .attr('stroke-dasharray',d=>d.type==='parent'?'4,3':null);
  const node = mainG.append('g').selectAll('g').data(nodes).join('g')
    .style('cursor',d=>d.role!=='center'?'pointer':'default')
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)simulation.alphaTarget(0.2).restart();if(d.role!=='center'&&d.role!=='parent'){d.fx=d.x;d.fy=d.y;}})
      .on('drag',(e,d)=>{if(d.role!=='center'&&d.role!=='parent'){d.fx=e.x;d.fy=e.y;}})
      .on('end',(e,d)=>{if(!e.active)simulation.alphaTarget(0);if(d.role!=='center'&&d.role!=='parent'){d.fx=null;d.fy=null;}})
    );
  node.filter(d=>d.role==='center').append('circle').attr('r',40).attr('fill','none').attr('stroke','#00e5ff').attr('stroke-width',0.5).attr('opacity',0.2).attr('stroke-dasharray','3,4');
  node.append('circle').attr('r',d=>getRadius(d)).attr('fill',d=>nodeColor(d,d.role)).attr('fill-opacity',d=>d.role==='center'?0.15:0.18).attr('stroke',d=>nodeColor(d,d.role)).attr('stroke-width',d=>d.role==='center'?2:1.5).attr('filter',d=>d.role==='center'?'url(#glow-center)':null);
  node.filter(d=>d.role==='child').append('text').text(d=>{const k=(childrenMap[d.id]||[]).length;return k>0?k:'';}).attr('text-anchor','middle').attr('dy','-1px').attr('font-family','JetBrains Mono,monospace').attr('font-size','8px').attr('fill',d=>nodeColor(d,d.role)).attr('pointer-events','none');
  node.append('text').text(d=>d.id).attr('text-anchor','middle').attr('dy',d=>getRadius(d)+13).attr('font-family','JetBrains Mono,monospace').attr('font-size',d=>d.role==='center'?'12px':'10px').attr('font-weight',d=>d.role==='center'?'600':'400').attr('fill',d=>d.role==='center'?'#00e5ff':d.role==='parent'?'#9c7dff':'#5a8070').attr('pointer-events','none');
  node.filter(d=>modelEntities[d.id.toUpperCase()]).append('text').text(d=>`◆${modelEntities[d.id.toUpperCase()]}`).attr('text-anchor','middle').attr('dy',d=>getRadius(d)+25).attr('font-family','JetBrains Mono,monospace').attr('font-size','9px').attr('fill','#ff4081').attr('pointer-events','none');
  node.filter(d=>d.role!=='center').on('click',(event,d)=>{event.stopPropagation();navigateTo(d.id);});
  node.on('mouseover',(e,d)=>d3.select(e.currentTarget).select('circle').attr('fill-opacity',0.4)).on('mouseout',(e,d)=>d3.select(e.currentTarget).select('circle').attr('fill-opacity',d.role==='center'?0.15:0.18));
  simulation.on('tick',()=>{link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);node.attr('transform',d=>`translate(${d.x},${d.y})`);});
  updateDetail(code);
}

function navigateTo(code) {
  if(!byCode[code]) return;
  if(code!==currentNode){history.push(currentNode);document.getElementById('backBtn').disabled=false;}
  currentNode=code; renderGraph(code); updateBreadcrumb();
}
function goBack() {
  if(!history.length) return;
  currentNode=history.pop();
  if(!history.length) document.getElementById('backBtn').disabled=true;
  renderGraph(currentNode); updateBreadcrumb();
}
function updateBreadcrumb() {
  const chain=[...history,currentNode].slice(-5);
  document.getElementById('breadcrumb').innerHTML=chain.map((code,i)=>{
    const isCurrent=i===chain.length-1;
    return `${i>0?'<span class="crumb-sep">›</span>':''}<span class="crumb ${isCurrent?'current':''}" ${!isCurrent?`onclick="jumpTo('${code}')"`:''}>${code}</span>`;
  }).join('');
}
function jumpTo(code) {
  const idx=history.indexOf(code); if(idx!==-1) history=history.slice(0,idx);
  currentNode=code; document.getElementById('backBtn').disabled=history.length===0;
  renderGraph(code); updateBreadcrumb();
}
function updateDetail(code) {
  const n=byCode[code]; if(!n) return;
  const kids=childrenMap[code]||[];
  const cnt=modelEntities[code.toUpperCase()]||0;
  const docUrl=currentSchema==='ifc2x3'?`https://standards.buildingsmart.org/IFC/RELEASE/IFC2x3/TC1/HTML/ifckernel/lexical/${code.toLowerCase()}.htm`:currentSchema==='ifc4'?`https://standards.buildingsmart.org/IFC/RELEASE/IFC4/ADD2_TC1/HTML/link/${code.toLowerCase()}.htm`:`https://ifc43-docs.standards.buildingsmart.org/IFC/RELEASE/IFC4x3/HTML/lexical/${code}.htm`;
  document.getElementById('dp-title').textContent=code;
  document.getElementById('dp-title').style.color=cnt?'#ff4081':'#00e5ff';
  document.getElementById('dp-subtitle').textContent=n.name||'';
  document.getElementById('dp-body').innerHTML=`
    ${cnt?`<div class="instance-badge">◆ ${cnt} instance${cnt>1?'s':''}</div>`:''}
    ${n.def?`<div class="dp-section"><div class="dp-section-title">Définition</div><div class="dp-section-body">${n.def.slice(0,250)}…</div></div>`:''}
    <div class="dp-section"><div class="dp-section-title">Hiérarchie</div><div class="dp-section-body">
      ${n.parent&&byCode[n.parent]?`Parent : <span style="color:#9c7dff;cursor:pointer" onclick="navigateTo('${n.parent}')">${n.parent}</span><br>`:'<span style="color:var(--dim)">Racine</span><br>'}
      ${kids.length} sous-type${kids.length!==1?'s':''}
    </div></div>
    ${kids.length?`<div class="dp-section"><div class="dp-section-title">Sous-types (${kids.length})</div><div class="dp-section-body">${kids.map(k=>{const kc=modelEntities[k.toUpperCase()]||0;const kk=(childrenMap[k]||[]).length;return`<div style="margin-bottom:2px"><span style="color:${kc?'#ff4081':'#00e676'};cursor:pointer" onclick="navigateTo('${k}')">${k}</span>${kc?`<span style="color:#ff4081;font-size:9px"> ◆${kc}</span>`:''}${kk?`<span style="color:var(--dim);font-size:9px"> [${kk}]</span>`:''}</div>`;}).join('')}</div></div>`:''}
    <a href="${docUrl}" target="_blank" class="dp-link">↗ Documentation officielle</a>`;
}

document.getElementById('searchInput').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  const sr=document.getElementById('searchResults');
  if(!q||q.length<2){sr.style.display='none';return;}
  const matches=Object.values(byCode).filter(n=>n.id.toLowerCase().includes(q)).slice(0,10);
  if(!matches.length){sr.style.display='none';return;}
  sr.innerHTML=matches.map(n=>`<div class="search-item" onclick="navigateTo('${n.id}');document.getElementById('searchInput').value='';document.getElementById('searchResults').style.display='none'">${n.id}<span style="color:var(--dim);font-size:9px"> ↳${n.parent||'racine'}</span></div>`).join('');
  sr.style.display='block';
});
document.addEventListener('click',e=>{if(!document.getElementById('searchWrap').contains(e.target))document.getElementById('searchResults').style.display='none';});

const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f&&f.name.endsWith('.ifc'))loadIFC(f);});
fileInput.addEventListener('change',e=>{if(e.target.files[0])loadIFC(e.target.files[0]);});
function loadIFC(file) {
  document.getElementById('dropStatus').textContent='Lecture...';
  const reader=new FileReader();
  reader.onload=e=>{
    const header=e.target.result.slice(0,500);
    const vMatch=header.match(/IFC2X3|IFC4X3|IFC4/i);
    if(vMatch){const v=vMatch[0].toUpperCase();currentSchema=v==='IFC2X3'?'ifc2x3':v==='IFC4X3'?'ifc4x3':'ifc4';document.getElementById('schemaSelect').value=currentSchema;}
    const rx=/=#\d+=\s*(IFC[A-Z0-9]+)\s*\(/gi;
    let m; modelEntities={};
    while((m=rx.exec(e.target.result))!==null){const k=m[1].toUpperCase();modelEntities[k]=(modelEntities[k]||0)+1;}
    const cnt=Object.keys(modelEntities).length;
    document.getElementById('dropStatus').textContent=`✓ ${cnt} types · ${file.name.slice(0,20)}`;
    setMode('ifc');
  };
  reader.readAsText(file);
}

// INIT
showLoading(true);
loadSchema('ifc4x3');

function togglePalette() {
  var c = document.getElementById('controls');
  var btn = document.getElementById('togglePalette');
  if (!c) return;
  c.classList.toggle('hidden');
  btn.innerHTML = c.classList.contains('hidden') ? '&#8250; Palette' : '&#8249; Palette';
}

</script>
