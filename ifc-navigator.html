<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFC Navigator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@400;700;800&display=swap');
:root{--bg:#07090f;--panel:#0c1018;--border:#161e2c;--border2:#1e2d42;--text:#7a9ab8;--bright:#cde0f5;--dim:#283849;--cyan:#00e5ff;--purple:#7c4dff;--green:#00e676;--pink:#ff4081;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'JetBrains Mono',monospace;color:var(--text);overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column;}

/* HEADER */
header{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:var(--cyan);}
.logo span{color:var(--dim);}
.back-link{font-size:10px;color:var(--dim);text-decoration:none;padding:3px 8px;border:1px solid var(--border2);border-radius:3px;}
.back-link:hover{color:var(--cyan);border-color:var(--cyan);}
.mode-tabs{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border2);border-radius:4px;padding:2px;}
.mode-tab{padding:3px 10px;border-radius:3px;font-size:10px;cursor:pointer;color:var(--dim);border:none;background:transparent;font-family:'JetBrains Mono',monospace;transition:all 0.15s;}
.mode-tab.active{background:var(--cyan);color:#000;font-weight:600;}
.schema-select{background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 6px;border-radius:3px;outline:none;}
.schema-select:disabled{opacity:0.3;}
.drop-btn{padding:3px 10px;border:1px dashed var(--border2);border-radius:3px;font-size:10px;cursor:pointer;color:var(--dim);background:transparent;font-family:'JetBrains Mono',monospace;position:relative;}
.drop-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
#dropStatus{font-size:10px;color:var(--green);}
#modeLabel{font-size:10px;color:var(--pink);display:none;}
#backBtn{background:transparent;border:1px solid var(--border2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:3px;cursor:pointer;}
#backBtn:disabled{opacity:0.2;}
#breadcrumb{display:flex;align-items:center;gap:3px;flex:1;overflow:hidden;min-width:0;}
.crumb{font-size:10px;color:var(--text);cursor:pointer;white-space:nowrap;padding:2px 5px;border-radius:3px;}
.crumb.current{color:var(--cyan);}
.crumb-sep{color:var(--dim);font-size:9px;}
#searchInput{background:var(--bg);border:1px solid var(--border2);color:var(--bright);padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:10px;border-radius:3px;outline:none;width:140px;}
#searchInput:focus{border-color:var(--cyan);}
#searchInput::placeholder{color:var(--dim);}
#searchResults{position:absolute;top:100%;left:0;right:0;background:var(--panel);border:1px solid var(--border2);border-radius:3px;z-index:100;max-height:180px;overflow-y:auto;display:none;}
.search-item{padding:5px 8px;font-size:10px;cursor:pointer;border-bottom:1px solid var(--border);}
.search-item:hover{background:rgba(0,229,255,0.06);color:var(--cyan);}
#searchWrap{position:relative;}

/* MOBILE TABS */
.mobile-tabs{display:none;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.mobile-tabs button{flex:1;padding:8px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.15s;}
.mobile-tabs button.active{color:var(--cyan);border-bottom-color:var(--cyan);}

/* WORKSPACE */
.workspace{display:flex;flex:1;overflow:hidden;}
#graphWrap{flex:1;position:relative;overflow:hidden;}
#graphSvg{width:100%;height:100%;}
#nodeCount{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--dim);pointer-events:none;white-space:nowrap;}

/* DETAIL PANEL */
#detailPanel{width:260px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width 0.3s;}
#detailPanel.collapsed{width:0;overflow:hidden;}
.dp-toggle{position:absolute;top:50%;right:260px;transform:translateY(-50%);background:var(--panel);border:1px solid var(--border2);border-right:none;border-radius:3px 0 0 3px;padding:6px 4px;cursor:pointer;color:var(--dim);font-size:12px;z-index:10;transition:right 0.3s;}
.dp-toggle.collapsed{right:0;}
.dp-header{padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;}
.dp-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:2px;}
.dp-subtitle{font-size:9px;color:var(--dim);}
.dp-body{flex:1;overflow-y:auto;padding:10px 12px;}
.dp-section{margin-bottom:10px;}
.dp-section-title{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);font-weight:600;margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid var(--border);}
.dp-section-body{font-size:10px;line-height:1.7;color:var(--text);}
.dp-link{display:inline-block;margin-top:8px;font-size:10px;color:var(--cyan);text-decoration:none;border:1px solid rgba(0,229,255,0.3);padding:3px 8px;border-radius:3px;}
.instance-badge{display:inline-block;background:var(--pink);color:#fff;padding:2px 8px;border-radius:3px;font-weight:700;font-size:11px;margin-bottom:8px;}

/* LEGEND */
#legend{position:absolute;bottom:12px;left:12px;background:rgba(12,16,24,0.9);border:1px solid var(--border2);border-radius:4px;padding:8px 12px;font-size:9px;z-index:10;backdrop-filter:blur(8px);}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--dim);flex-direction:column;gap:10px;z-index:50;}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* RESPONSIVE */
@media(max-width:640px){
  .mobile-tabs{display:flex;}
  #detailPanel{position:absolute;inset:0;top:auto;bottom:0;width:100%!important;height:60%;border-left:none;border-top:1px solid var(--border);z-index:20;transform:translateY(100%);transition:transform 0.3s;}
  #detailPanel.mobile-visible{transform:translateY(0);}
  .dp-toggle{display:none;}
  #breadcrumb{display:none;}
  #searchInput{width:110px;}
  .schema-select{font-size:9px;padding:2px 4px;}
}
/* ===== IFC LOAD MODAL ===== */
#ifcModal{position:fixed;inset:0;background:rgba(6,8,16,0.92);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(8px);display:none;}
#ifcModal.visible{display:flex;}
.ifc-modal-box{background:#0c1018;border:1px solid #1e2d42;border-radius:6px;padding:28px 32px;width:340px;text-align:center;}
.ifc-modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#00e5ff;margin-bottom:6px;}
.ifc-modal-sub{font-size:10px;color:#283849;margin-bottom:20px;}
.ifc-modal-filename{font-size:11px;color:#7a9ab8;margin-bottom:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.progress-track{height:4px;background:#161e2c;border-radius:2px;overflow:hidden;margin-bottom:12px;}
.progress-fill{height:100%;background:linear-gradient(90deg,#00e5ff,#7c4dff);border-radius:2px;width:0%;transition:width 0.2s;}
.progress-pct{font-size:11px;color:#00e5ff;font-weight:600;}
.ifc-modal-status{font-size:10px;color:#283849;margin-top:8px;}

/* ===== VIEW SWITCHER ===== */
.view-switcher{display:flex;gap:2px;margin-left:auto;}
.view-btn{padding:3px 9px;border-radius:3px;font-size:10px;cursor:pointer;color:#283849;border:1px solid #1e2d42;background:transparent;font-family:'JetBrains Mono',monospace;text-decoration:none;transition:all 0.15s;white-space:nowrap;}
.view-btn:hover{color:#00e5ff;border-color:#00e5ff;}
.view-btn.current{background:rgba(0,229,255,0.1);border-color:#00e5ff;color:#00e5ff;}

/* ===== SCHEMA LOADING OVERLAY ===== */
#schemaLoading{position:fixed;inset:0;background:rgba(6,8,16,0.96);display:none;align-items:center;justify-content:center;z-index:900;flex-direction:column;gap:16px;backdrop-filter:blur(4px);}
#schemaLoading.visible{display:flex;}
.schema-loading-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#00e5ff;}
.schema-loading-sub{font-size:11px;color:#283849;}
.spinner-lg{width:40px;height:40px;border:2px solid #1e2d42;border-top-color:#00e5ff;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

  --border2: #263548;

  --bright:  #ddeeff;

  --pink:    #ff3377;

  --yellow:  #ffcc00;
  --accent:  #00d4f0;

[data-theme="light"] header,

[data-theme="light"] #leftPanel,
[data-theme="light"] #rightPanel,
[data-theme="light"] #bottomPanel,

[data-theme="light"] .lp-header,

}

[data-theme="light"] .rbtn:hover { background: rgba(0,111,168,0.08); }
[data-theme="light"] .ctrl-panel { background: rgba(255,255,255,0.95); }

<script>
// ===== THEME MANAGER v2 =====
const THEME_KEY = 'ifc_theme';

function applyTheme(theme) {
  const root = document.documentElement;
  if (theme === 'system') {
    const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    root.setAttribute('data-theme', dark ? 'dark' : 'light');
  } else {
    root.setAttribute('data-theme', theme);
  }
  // Mettre à jour tous les boutons (header + ribbon)
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === theme);
  });
  sessionStorage.setItem(THEME_KEY, theme);
}

function initTheme() {
  const saved = sessionStorage.getItem(THEME_KEY) || 'system';
  applyTheme(saved);
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (sessionStorage.getItem(THEME_KEY) === 'system') applyTheme('system');
  });
}

// ===== SHARED IFC STATE (sessionStorage) =====
// Clés sessionStorage
const SS_KEY_ENTITIES = 'ifc_entities';
const SS_KEY_VERSION  = 'ifc_version';
const SS_KEY_FILENAME = 'ifc_filename';
const SS_KEY_COUNT    = 'ifc_count';

function saveIFCState(entities, version, filename) {
  try {
    sessionStorage.setItem(SS_KEY_ENTITIES, JSON.stringify(entities));
    sessionStorage.setItem(SS_KEY_VERSION,  version);
    sessionStorage.setItem(SS_KEY_FILENAME, filename);
    sessionStorage.setItem(SS_KEY_COUNT,    Object.keys(entities).length);
  } catch(e) { console.warn('sessionStorage write failed', e); }
}

function loadIFCState() {
  try {
    const entities = JSON.parse(sessionStorage.getItem(SS_KEY_ENTITIES) || 'null');
    const version  = sessionStorage.getItem(SS_KEY_VERSION);
    const filename = sessionStorage.getItem(SS_KEY_FILENAME);
    const count    = sessionStorage.getItem(SS_KEY_COUNT);
    if (!entities) return null;
    return { entities, version, filename, count: parseInt(count) };
  } catch(e) { return null; }
}

function clearIFCState() {
  [SS_KEY_ENTITIES, SS_KEY_VERSION, SS_KEY_FILENAME, SS_KEY_COUNT].forEach(k => sessionStorage.removeItem(k));
}

// ===== CHUNKED IFC PARSER =====
// Lit le fichier par blocs pour éviter de bloquer l'UI
// Retourne { entities, version } via callbacks onProgress(pct) + onDone(result)
function parseIFCChunked(file, onProgress, onDone) {
  const CHUNK = 8 * 1024 * 1024; // 8 MB par chunk
  const total = file.size;
  let offset = 0;
  const entities = {};
  let version = 'ifc4x3';
  let headerRead = false;
  let remainder = '';

  const rx = /=#\d+=\s*(IFC[A-Z0-9]+)\s*\(/g;
  const vRx = /IFC2X3|IFC4X3|IFC4/i;

  function processChunk() {
    if (offset >= total) {
      onDone({ entities, version });
      return;
    }
    const blob = file.slice(offset, offset + CHUNK);
    const reader = new FileReader();
    reader.onload = e => {
      let text = remainder + e.target.result;
      // Détecter version depuis l'en-tête
      if (!headerRead && offset < 2000) {
        const m = text.match(vRx);
        if (m) {
          const v = m[0].toUpperCase();
          version = v === 'IFC2X3' ? 'ifc2x3' : v === 'IFC4X3' ? 'ifc4x3' : 'ifc4';
        }
        headerRead = true;
      }
      // Parser les entités
      let match;
      rx.lastIndex = 0;
      while ((match = rx.exec(text)) !== null) {
        const k = match[1].toUpperCase();
        entities[k] = (entities[k] || 0) + 1;
      }
      // Garder la fin pour le prochain chunk (éviter de couper une ligne)
      const lastNL = text.lastIndexOf('\n');
      remainder = lastNL >= 0 ? text.slice(lastNL + 1) : '';
      offset += CHUNK;
      onProgress(Math.min(99, Math.round((offset / total) * 100)));
      // Yield au browser pour ne pas bloquer l'UI
      setTimeout(processChunk, 0);
    };
    reader.readAsText(blob);
  }
  processChunk();
}


// ===== IFC DROP HANDLING =====
function initIFCDrop(dropEl, fileInputEl, onLoaded) {
  dropEl.addEventListener('dragover', e => { e.preventDefault(); dropEl.classList.add('drag-over'); });
  dropEl.addEventListener('dragleave', () => dropEl.classList.remove('drag-over'));
  dropEl.addEventListener('drop', e => {
    e.preventDefault(); dropEl.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.name.toLowerCase().endsWith('.ifc')) startIFCLoad(f, onLoaded);
  });
  if (fileInputEl) {
    fileInputEl.addEventListener('change', e => {
      if (e.target.files[0]) startIFCLoad(e.target.files[0], onLoaded);
    });
  }
}

function startIFCLoad(file, onLoaded) {
  const modal = document.getElementById('ifcModal');
  const fnEl  = document.getElementById('modalFilename');
  const pctEl = document.getElementById('modalPct');
  const barEl = document.getElementById('modalProgress');
  const stEl  = document.getElementById('modalStatus');

  modal.classList.add('visible');
  fnEl.textContent = file.name;
  pctEl.textContent = '0%';
  barEl.style.width = '0%';
  stEl.textContent = 'Lecture du fichier...';

  parseIFCChunked(file,
    pct => {
      barEl.style.width = pct + '%';
      pctEl.textContent = pct + '%';
      stEl.textContent = pct < 30 ? 'Lecture du fichier...'
        : pct < 70 ? 'Analyse des entités...'
        : 'Finalisation...';
    },
    result => {
      barEl.style.width = '100%';
      pctEl.textContent = '100%';
      stEl.textContent = `✓ ${Object.keys(result.entities).length} types trouvés`;
      saveIFCState(result.entities, result.version, file.name);
      setTimeout(() => {
        modal.classList.remove('visible');
        onLoaded(result);
      }, 600);
    }
  );
}

function updateDropStatus(state) {
  const el = document.getElementById('dropStatus');
  if (!el) return;
  if (state) {
    el.textContent = `◆ ${state.filename.slice(0, 20)} (${state.count} types)`;
    el.style.color = '#00e676';
  } else {
    el.textContent = '';
  }
}



const PSET_URLS = {
  ifc4x3: 'psets-ifc4x3.json'
};
const psetCache = {};

async function loadPsetData(v) {
  const url = PSET_URLS[v];
  if (!url) return {};
  if (psetCache[v]) return psetCache[v];
  try {
    const r = await fetch(url);
    const d = await r.json();
    psetCache[v] = d;
    return d;
  } catch(e) { return {}; }
}

const SCHEMA_URLS={ifc2x3:'schema-ifc2x3.json',ifc4:'schema-ifc4.json',ifc4x3:'schema-ifc4x3.json'};
const schemaCache={};
let mode='schema',currentSchema='ifc4x3',modelEntities={};
let currentNode=null,history=[],byCode={},childrenMap={};
const GROUPS={product:'#00e5ff',relation:'#ff4081',property:'#76ff03',geometry:'#ff9100',material:'#e040fb',process:'#40c4ff',control:'#ffea00',other:'#455a64'};

// Mobile
let isMobile=()=>window.innerWidth<=640;
function mobileView(v){
  const dp=document.getElementById('detailPanel');
  document.querySelectorAll('.mobile-tabs button').forEach((b,i)=>{b.classList.toggle('active',['graph','detail'][i]===v);});
  if(v==='detail') dp.classList.add('mobile-visible');
  else dp.classList.remove('mobile-visible');
}
function toggleDetail(){
  const dp=document.getElementById('detailPanel');
  const btn=document.getElementById('dpToggle');
  dp.classList.toggle('collapsed');
  btn.classList.toggle('collapsed');
  btn.textContent=dp.classList.contains('collapsed')?'›':'‹';
}

async function loadSchemaData(v){
  if(schemaCache[v])return schemaCache[v];
  document.getElementById('schemaLoading').classList.add('visible');document.getElementById('schemaLoadingLabel').textContent='Chargement schéma '+v+'...';
  const r=await fetch(SCHEMA_URLS[v]);
  const d=await r.json();
  schemaCache[v]=d;
  document.getElementById('schemaLoading').classList.remove('visible');
  return d;
}
function buildIndex(nodes){
  byCode={};childrenMap={};
  nodes.forEach(n=>{byCode[n.id]=n;if(!childrenMap[n.id])childrenMap[n.id]=[];if(n.parent){if(!childrenMap[n.parent])childrenMap[n.parent]=[];if(!childrenMap[n.parent].includes(n.id))childrenMap[n.parent].push(n.id);}});
}
function getRoots(){return Object.values(byCode).filter(n=>!n.parent||!byCode[n.parent]).map(n=>n.id);}
function getStart(){const r=getRoots();return r.includes('IfcRoot')?'IfcRoot':r[0];}

async function setMode(m){
  mode=m;
  document.getElementById('tabSchema').classList.toggle('active',m==='schema');
  document.getElementById('tabIfc').classList.toggle('active',m==='ifc');
  document.getElementById('schemaSelect').disabled=m==='ifc';
  document.getElementById('modeLabel').style.display=m==='ifc'?'block':'none';
  if(m==='schema') await loadSchema(currentSchema);
  else{if(!Object.keys(modelEntities).length){alert('Charger un .ifc d\'abord');setMode('schema');return;}await buildIfcMode();}
}
async function onSchemaChange(){currentSchema=document.getElementById('schemaSelect').value;if(mode==='schema')await loadSchema(currentSchema);}
async function loadSchema(v){const n=await loadSchemaData(v);buildIndex(n);history=[];document.getElementById('backBtn').disabled=true;currentNode=getStart();renderGraph(currentNode);updateBreadcrumb();}
async function buildIfcMode(){
  const ref=await loadSchemaData(currentSchema);
  const tmp={};ref.forEach(n=>tmp[n.id]=n);
  const keep=new Set();
  Object.keys(modelEntities).forEach(c=>{let cur=c;while(cur&&tmp[cur]){keep.add(cur);cur=tmp[cur].parent;}});
  buildIndex(ref.filter(n=>keep.has(n.id)));
  history=[];document.getElementById('backBtn').disabled=true;currentNode=getStart();renderGraph(currentNode);updateBreadcrumb();
}

// SVG
const svg=d3.select('#graphSvg');
const defs=svg.append('defs');
const f=defs.append('filter').attr('id','glow').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
f.append('feGaussianBlur').attr('stdDeviation',8).attr('result','blur');
const fm=f.append('feMerge');fm.append('feMergeNode').attr('in','blur');fm.append('feMergeNode').attr('in','SourceGraphic');
const mainG=svg.append('g');
const zoom=d3.zoom().scaleExtent([0.15,5]).on('zoom',e=>mainG.attr('transform',e.transform));
svg.call(zoom);
let simulation;

function nColor(d,role){
  if(role==='center')return'#00e5ff';
  if(role==='parent')return'#7c4dff';
  if(modelEntities[d.id.toUpperCase()])return'#ff4081';
  return GROUPS[d.group]||'#00e676';
}
function nRadius(d){return d.role==='center'?26:d.role==='parent'?17:(childrenMap[d.id]||[]).length>0?13:9;}

function renderGraph(code){
  const wrap=document.getElementById('graphWrap');
  const W=wrap.clientWidth,H=wrap.clientHeight,cx=W/2,cy=H/2;
  const n=byCode[code];if(!n)return;
  const nodes=[{...n,role:'center'}],links=[];
  if(n.parent&&byCode[n.parent]){nodes.push({...byCode[n.parent],role:'parent'});links.push({source:n.parent,target:code,type:'parent'});}
  (childrenMap[code]||[]).forEach(k=>{if(byCode[k]){nodes.push({...byCode[k],role:'child'});links.push({source:code,target:k,type:'child'});}});
  nodes.forEach(d=>{
    if(d.role==='center'){d.x=cx;d.y=cy;d.fx=cx;d.fy=cy;}
    else if(d.role==='parent'){d.x=cx;d.y=cy-160;d.fx=cx;d.fy=cy-160;}
    else{const ch=nodes.filter(x=>x.role==='child');const i=ch.indexOf(d);const t=ch.length;const a=(i/t)*2*Math.PI-Math.PI/2;const r=Math.min(W,H)*0.28;d.x=cx+Math.cos(a)*r;d.y=cy+Math.sin(a)*r;}
  });
  if(simulation)simulation.stop();
  mainG.selectAll('*').remove();
  document.getElementById('nodeCount').textContent=`${nodes.length} nœuds · ${links.length} liens`;
  const kidCount=(childrenMap[code]||[]).length;
  simulation=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(d=>d.type==='parent'?160:Math.max(80,Math.min(160,600/Math.max(kidCount,1)))).strength(0.7))
    .force('charge',d3.forceManyBody().strength(d=>d.role==='center'?0:-160))
    .force('collision',d3.forceCollide().radius(d=>nRadius(d)+26))
    .alphaDecay(0.025).velocityDecay(0.45);
  const link=mainG.append('g').selectAll('line').data(links).join('line')
    .attr('stroke',d=>d.type==='parent'?'#261545':'#0d2518')
    .attr('stroke-width',d=>d.type==='parent'?1.5:1)
    .attr('stroke-dasharray',d=>d.type==='parent'?'4,3':null);
  const node=mainG.append('g').selectAll('g').data(nodes).join('g').style('cursor',d=>d.role!=='center'?'pointer':'default')
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)simulation.alphaTarget(0.2).restart();if(d.role!=='center'&&d.role!=='parent'){d.fx=d.x;d.fy=d.y;}})
      .on('drag',(e,d)=>{if(d.role!=='center'&&d.role!=='parent'){d.fx=e.x;d.fy=e.y;}})
      .on('end',(e,d)=>{if(!e.active)simulation.alphaTarget(0);if(d.role!=='center'&&d.role!=='parent'){d.fx=null;d.fy=null;}})
    );
  node.filter(d=>d.role==='center').append('circle').attr('r',40).attr('fill','none').attr('stroke','#00e5ff').attr('stroke-width',0.5).attr('opacity',0.2).attr('stroke-dasharray','3,4');
  node.append('circle').attr('r',d=>nRadius(d)).attr('fill',d=>nColor(d,d.role)).attr('fill-opacity',d=>d.role==='center'?0.15:0.18).attr('stroke',d=>nColor(d,d.role)).attr('stroke-width',d=>d.role==='center'?2:1.5).attr('filter',d=>d.role==='center'?'url(#glow)':null);
  node.filter(d=>d.role==='child').append('text').text(d=>{const k=(childrenMap[d.id]||[]).length;return k>0?k:'';}).attr('text-anchor','middle').attr('dy','-1px').attr('font-family','JetBrains Mono,monospace').attr('font-size','8px').attr('fill',d=>nColor(d,d.role)).attr('pointer-events','none');
  node.append('text').text(d=>d.id).attr('text-anchor','middle').attr('dy',d=>nRadius(d)+13).attr('font-family','JetBrains Mono,monospace').attr('font-size',d=>d.role==='center'?'11px':'9px').attr('font-weight',d=>d.role==='center'?'600':'400').attr('fill',d=>d.role==='center'?'#00e5ff':d.role==='parent'?'#9c7dff':'#5a8070').attr('pointer-events','none');
  node.filter(d=>modelEntities[d.id.toUpperCase()]).append('text').text(d=>`◆${modelEntities[d.id.toUpperCase()]}`).attr('text-anchor','middle').attr('dy',d=>nRadius(d)+24).attr('font-family','JetBrains Mono,monospace').attr('font-size','8px').attr('fill','#ff4081').attr('pointer-events','none');
  node.filter(d=>d.role!=='center').on('click',(event,d)=>{event.stopPropagation();navigateTo(d.id);if(isMobile())mobileView('detail');});
  node.on('mouseover',(e,d)=>d3.select(e.currentTarget).select('circle').attr('fill-opacity',0.4)).on('mouseout',(e,d)=>d3.select(e.currentTarget).select('circle').attr('fill-opacity',d.role==='center'?0.15:0.18));
  simulation.on('tick',()=>{link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);node.attr('transform',d=>`translate(${d.x},${d.y})`);});
  updateDetail(code);
}

function navigateTo(code){if(!byCode[code])return;if(code!==currentNode){history.push(currentNode);document.getElementById('backBtn').disabled=false;}currentNode=code;renderGraph(code);updateBreadcrumb();}
function goBack(){if(!history.length)return;currentNode=history.pop();if(!history.length)document.getElementById('backBtn').disabled=true;renderGraph(currentNode);updateBreadcrumb();}
function updateBreadcrumb(){const chain=[...history,currentNode].slice(-4);document.getElementById('breadcrumb').innerHTML=chain.map((c,i)=>{const cur=i===chain.length-1;return`${i>0?'<span class="crumb-sep">›</span>':''}<span class="crumb ${cur?'current':''}" ${!cur?`onclick="jumpTo('${c}')"`:''}>${c}</span>`;}).join('');}
function jumpTo(code){const i=history.indexOf(code);if(i!==-1)history=history.slice(0,i);currentNode=code;document.getElementById('backBtn').disabled=history.length===0;renderGraph(code);updateBreadcrumb();}

async function updateDetail(code) {
  const n = byCode[code]; if (!n) return;
  const kids = childrenMap[code] || [];
  const cnt = modelEntities[code.toUpperCase()] || 0;
  const doc = currentSchema === 'ifc2x3'
    ? `https://standards.buildingsmart.org/IFC/RELEASE/IFC2x3/TC1/HTML/ifckernel/lexical/${code.toLowerCase()}.htm`
    : currentSchema === 'ifc4'
    ? `https://standards.buildingsmart.org/IFC/RELEASE/IFC4/ADD2_TC1/HTML/link/${code.toLowerCase()}.htm`
    : `https://ifc43-docs.standards.buildingsmart.org/IFC/RELEASE/IFC4x3/HTML/lexical/${code}.htm`;

  document.getElementById('dp-title').textContent = code;
  document.getElementById('dp-title').style.color = cnt ? '#ff4081' : '#00e5ff';
  document.getElementById('dp-subtitle').textContent = n.name || '';

  // Charger PSET en parallèle
  const psetData = await loadPsetData(currentSchema);
  const classData = psetData[code] || {};
  const attrs = classData.a || [];
  const psets = classData.p || {};
  const qtos = classData.q || {};

  const typeLabel = t => {
    if (t === 'str') return '<span style="color:#5a7080">string</span>';
    if (t === 'num') return '<span style="color:#ff9100">number</span>';
    if (t === 'bool') return '<span style="color:#76ff03">boolean</span>';
    if (t === 'int') return '<span style="color:#ff9100">integer</span>';
    if (t.startsWith('ref:')) return `<span style="color:#7c4dff">${t.slice(4)}</span>`;
    if (t.startsWith('enum:')) {
      const vals = t.slice(5).split(',').slice(0, 4);
      return `<span style="color:#e040fb">enum</span> <span style="color:#283849;font-size:9px">${vals.join(' | ')}${t.split(',').length > 4 ? '…' : ''}</span>`;
    }
    return `<span style="color:#5a7080">${t}</span>`;
  };

  document.getElementById('dp-body').innerHTML = `
    ${cnt ? `<div class="instance-badge">◆ ${cnt} instance${cnt > 1 ? 's' : ''}</div>` : ''}

    ${n.def ? `<div class="dp-section">
      <div class="dp-section-title">Définition</div>
      <div class="dp-section-body">${n.def.slice(0, 220)}${n.def.length > 220 ? '…' : ''}</div>
    </div>` : ''}

    <div class="dp-section">
      <div class="dp-section-title">Hiérarchie</div>
      <div class="dp-section-body">
        ${n.parent && byCode[n.parent] ? `Parent : <span style="color:#9c7dff;cursor:pointer" onclick="navigateTo('${n.parent}')">${n.parent}</span><br>` : '<span style="color:var(--dim)">Racine</span><br>'}
        ${kids.length} sous-type${kids.length !== 1 ? 's' : ''}
      </div>
    </div>

    ${attrs.length ? `<div class="dp-section">
      <div class="dp-section-title">Attributs directs (${attrs.length})</div>
      <div class="dp-section-body">
        <table style="width:100%;border-collapse:collapse;">
          ${attrs.map(a => `<tr style="border-bottom:1px solid var(--border)">
            <td style="padding:3px 0;color:${a.o ? 'var(--dim)' : 'var(--bright)'};font-size:10px;width:50%">${a.o ? '' : '<span style="color:#ff4081" title="Obligatoire">!</span> '}${a.n}</td>
            <td style="padding:3px 0;font-size:10px">${typeLabel(a.t)}</td>
          </tr>`).join('')}
        </table>
      </div>
    </div>` : ''}

    ${Object.keys(psets).length ? `<div class="dp-section">
      <div class="dp-section-title">Property Sets (${Object.keys(psets).length})</div>
      <div class="dp-section-body">
        ${Object.entries(psets).map(([pname, props]) => `
          <div style="margin-bottom:8px">
            <div style="color:var(--cyan);font-size:10px;font-weight:600;margin-bottom:3px">${pname}</div>
            ${props.map(p => `<div style="padding:2px 0 2px 8px;border-left:1px solid var(--border2);margin-bottom:2px">
              <span style="color:var(--bright);font-size:10px">${p.n}</span>
              ${p.k ? `<span style="color:#e040fb;font-size:9px"> [${p.k}]</span>` : ''}
              ${p.d ? `<div style="color:var(--dim);font-size:9px;margin-top:1px">${p.d}</div>` : ''}
            </div>`).join('')}
          </div>
        `).join('')}
      </div>
    </div>` : ''}

    ${Object.keys(qtos).length ? `<div class="dp-section">
      <div class="dp-section-title">Quantités (QTO)</div>
      <div class="dp-section-body">
        ${Object.entries(qtos).map(([qname, props]) => `
          <div style="margin-bottom:8px">
            <div style="color:#ff9100;font-size:10px;font-weight:600;margin-bottom:3px">${qname}</div>
            ${props.map(p => `<div style="padding:2px 0 2px 8px;border-left:1px solid var(--border2);margin-bottom:2px">
              <span style="color:var(--bright);font-size:10px">${p.n}</span>
              ${p.d ? `<div style="color:var(--dim);font-size:9px;margin-top:1px">${p.d}</div>` : ''}
            </div>`).join('')}
          </div>
        `).join('')}
      </div>
    </div>` : ''}

    ${kids.length ? `<div class="dp-section">
      <div class="dp-section-title">Sous-types (${kids.length})</div>
      <div class="dp-section-body">
        ${kids.map(k => {
          const kc = modelEntities[k.toUpperCase()] || 0;
          const kk = (childrenMap[k] || []).length;
          return `<div style="margin-bottom:2px">
            <span style="color:${kc ? '#ff4081' : '#00e676'};cursor:pointer" onclick="navigateTo('${k}');if(isMobile())mobileView('graph')">${k}</span>
            ${kc ? `<span style="color:#ff4081;font-size:9px"> ◆${kc}</span>` : ''}
            ${kk ? `<span style="color:var(--dim);font-size:9px"> [${kk}]</span>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}

    <a href="${doc}" target="_blank" class="dp-link">↗ Documentation officielle</a>`;
}

document.getElementById('searchInput').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();const sr=document.getElementById('searchResults');
  if(!q||q.length<2){sr.style.display='none';return;}
  const m=Object.values(byCode).filter(n=>n.id.toLowerCase().includes(q)).slice(0,10);
  if(!m.length){sr.style.display='none';return;}
  sr.innerHTML=m.map(n=>`<div class="search-item" onclick="navigateTo('${n.id}');document.getElementById('searchInput').value='';document.getElementById('searchResults').style.display='none';if(isMobile())mobileView('graph')">${n.id}<span style="color:var(--dim);font-size:8px"> ↳${n.parent||'racine'}</span></div>`).join('');
  sr.style.display='block';
});
document.addEventListener('click',e=>{if(!document.getElementById('searchWrap').contains(e.target))document.getElementById('searchResults').style.display='none';});

// IFC Drop init
initIFCDrop(
  document.getElementById('dropZone'),
  document.getElementById('fileInput'),
  result => {
    modelEntities = result.entities;
    currentSchema = result.version;
    document.getElementById('schemaSelect').value = currentSchema;
    updateDropStatus({ filename: result.filename || sessionStorage.getItem('ifc_filename'), count: Object.keys(result.entities).length });
    setMode('ifc');
  }
);

// Restaurer état IFC depuis sessionStorage
(function restoreIFC() {
  const state = loadIFCState();
  if (!state) return;
  modelEntities = state.entities;
  currentSchema = state.version || 'ifc4x3';
  document.getElementById('schemaSelect').value = currentSchema;
  updateDropStatus(state);
  // Basculer en mode IFC si données présentes
  setTimeout(() => setMode('ifc'), 100);
})();

window.addEventListener('resize',()=>{if(currentNode)renderGraph(currentNode);});
loadSchema('ifc4x3');
</script>
