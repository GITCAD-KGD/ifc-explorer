<!DOCTYPE html>
<html lang="fr">
<head>
<script>
(function(){
  var t=sessionStorage.getItem('ifc_theme')||'system';
  var dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  document.documentElement.setAttribute('data-theme', t==='system'?(dark?'dark':'light'):t);
})();
</script>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFC Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@400;600;800&display=swap');
:root{--bg:#0a0c0f;--bg2:#10141a;--bg3:#161c24;--border:#1e2a38;--accent:#00e5ff;--accent2:#7c4dff;--accent3:#00e676;--warn:#ff4081;--text:#c8d6e5;--dim:#5a7080;--bright:#eaf2ff;--panel:#0d1219;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:7px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--accent);}
.logo span{color:var(--dim);}
.back-link{font-size:10px;color:var(--dim);text-decoration:none;padding:3px 7px;border:1px solid var(--border);border-radius:3px;}
.back-link:hover{color:var(--accent);border-color:var(--accent);}
.mode-tabs{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px;}
.mode-tab{padding:3px 9px;border-radius:3px;font-size:10px;cursor:pointer;color:var(--dim);border:none;background:transparent;font-family:'JetBrains Mono',monospace;transition:all 0.15s;}
.mode-tab.active{background:var(--accent);color:#000;font-weight:600;}
.schema-select{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 5px;border-radius:3px;outline:none;}
.schema-select:disabled{opacity:0.3;}
.drop-btn{padding:3px 9px;border:1px dashed var(--border);border-radius:3px;font-size:10px;cursor:pointer;color:var(--dim);background:transparent;position:relative;}
.drop-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
#dropStatus{font-size:9px;color:var(--accent3);}
#modeLabel{font-size:9px;color:var(--warn);display:none;}

/* MOBILE TABS */
.mobile-tabs{display:none;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.mobile-tabs button{flex:1;padding:8px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;}
.mobile-tabs button.active{color:var(--accent);border-bottom-color:var(--accent);}

/* DESKTOP LAYOUT */
.main{display:grid;grid-template-columns:250px 1fr 280px;flex:1;overflow:hidden;}
.panel{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel:last-child{border-right:none;border-left:1px solid var(--border);}
.panel-header{padding:6px 10px;background:var(--bg2);border-bottom:1px solid var(--border);font-family:'Syne',sans-serif;font-weight:600;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.panel-header .count{margin-left:auto;background:var(--bg3);padding:1px 5px;border-radius:10px;font-size:8px;color:var(--accent);}
.search-wrap{padding:5px 7px;border-bottom:1px solid var(--border);flex-shrink:0;}
.search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:10px;outline:none;}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap input::placeholder{color:var(--dim);}
.tree-container{overflow-y:auto;flex:1;padding:2px 0;}
.tree-node{display:flex;align-items:center;padding:2px 5px;cursor:pointer;border-left:2px solid transparent;user-select:none;}
.tree-node:hover{background:rgba(255,255,255,0.03);}
.tree-node.selected{background:rgba(0,229,255,0.07);border-left-color:var(--accent);}
.tree-node.present .node-name{color:var(--accent3);}
.tree-toggle{width:12px;height:12px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:8px;flex-shrink:0;}
.node-icon{font-size:8px;margin-right:3px;flex-shrink:0;}
.node-name{font-size:10px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.node-name.dim{color:var(--dim);}
.node-count{margin-left:auto;background:var(--accent3);color:#000;font-size:7px;font-weight:700;padding:1px 4px;border-radius:8px;flex-shrink:0;}
.tree-indent{flex-shrink:0;}
.center-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.filter-bar{padding:5px 8px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;}
.filter-btn{padding:2px 7px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:9px;cursor:pointer;transition:all 0.15s;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}
.entity-grid{flex:1;overflow-y:auto;padding:8px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:4px;align-content:start;}
.entity-card{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:6px 8px;cursor:pointer;transition:all 0.12s;}
.entity-card:hover{border-color:var(--accent);}
.entity-card.present-card{border-color:var(--accent3);}
.entity-card.present-card .ec-name{color:var(--accent3);}
.ec-name{font-size:10px;color:var(--text);font-weight:600;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ec-parent{font-size:8px;color:var(--dim);}
.ec-count{display:inline-block;margin-top:2px;background:var(--accent3);color:#000;font-size:7px;font-weight:700;padding:1px 4px;border-radius:8px;}
.center-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:11px;text-align:center;flex-direction:column;gap:5px;}
.center-empty .big{font-family:'Syne',sans-serif;font-size:32px;color:var(--border);}
.detail-content{flex:1;overflow-y:auto;padding:10px;}
.detail-empty{color:var(--dim);font-size:10px;text-align:center;margin-top:24px;line-height:1.8;}
.detail-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--accent);margin-bottom:2px;}
.detail-parent-chain{font-size:8px;color:var(--dim);margin-bottom:8px;}
.detail-parent-chain a{color:var(--accent2);cursor:pointer;}
.detail-section{margin-bottom:8px;background:var(--bg2);border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.detail-section-title{padding:4px 8px;background:var(--bg3);font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;border-bottom:1px solid var(--border);}
.detail-section-body{padding:6px 8px;font-size:10px;line-height:1.7;color:var(--text);}
.instance-badge{display:inline-block;background:var(--warn);color:#fff;padding:2px 8px;border-radius:3px;font-weight:700;font-size:11px;margin-bottom:8px;}
.child-link{display:block;color:var(--accent2);cursor:pointer;font-size:10px;padding:2px 0;}
.doc-link{display:inline-block;margin-top:5px;padding:3px 7px;border:1px solid var(--accent2);border-radius:3px;color:var(--accent2);font-size:9px;text-decoration:none;}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--dim);flex-direction:column;gap:10px;z-index:50;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* RESPONSIVE */
@media(max-width:640px){
  .mobile-tabs{display:flex;}
  .main{grid-template-columns:1fr;grid-template-rows:1fr;}
  .panel,.center-panel{display:none;}
  .panel.mobile-active,.center-panel.mobile-active{display:flex;}
  .entity-grid{grid-template-columns:1fr 1fr;}
}
/* ===== IFC LOAD MODAL ===== */
#ifcModal{position:fixed;inset:0;background:rgba(6,8,16,0.92);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(8px);display:none;}
#ifcModal.visible{display:flex;}
.ifc-modal-box{background:#0c1018;border:1px solid #1e2d42;border-radius:6px;padding:28px 32px;width:340px;text-align:center;}
.ifc-modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#00e5ff;margin-bottom:6px;}
.ifc-modal-sub{font-size:10px;color:#283849;margin-bottom:20px;}
.ifc-modal-filename{font-size:11px;color:#7a9ab8;margin-bottom:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.progress-track{height:4px;background:#161e2c;border-radius:2px;overflow:hidden;margin-bottom:12px;}
.progress-fill{height:100%;background:linear-gradient(90deg,#00e5ff,#7c4dff);border-radius:2px;width:0%;transition:width 0.2s;}
.progress-pct{font-size:11px;color:#00e5ff;font-weight:600;}
.ifc-modal-status{font-size:10px;color:#283849;margin-top:8px;}

/* ===== VIEW SWITCHER ===== */
.view-switcher{display:flex;gap:2px;margin-left:auto;}
.view-btn{padding:3px 9px;border-radius:3px;font-size:10px;cursor:pointer;color:#283849;border:1px solid #1e2d42;background:transparent;font-family:'JetBrains Mono',monospace;text-decoration:none;transition:all 0.15s;white-space:nowrap;}
.view-btn:hover{color:#00e5ff;border-color:#00e5ff;}
.view-btn.current{background:rgba(0,229,255,0.1);border-color:#00e5ff;color:#00e5ff;}

/* ===== SCHEMA LOADING OVERLAY ===== */
#schemaLoading{position:fixed;inset:0;background:rgba(6,8,16,0.96);display:none;align-items:center;justify-content:center;z-index:900;flex-direction:column;gap:16px;backdrop-filter:blur(4px);}
#schemaLoading.visible{display:flex;}
.schema-loading-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#00e5ff;}
.schema-loading-sub{font-size:11px;color:#283849;}
.spinner-lg{width:40px;height:40px;border:2px solid #1e2d42;border-top-color:#00e5ff;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}


/* ===== THEME ===== */
:root, [data-theme="dark"] {
  --bg:     #0a0e15;
  --bg2:    #111820;
  --bg3:    #18222e;
  --panel:  #0e1520;
  --border: #1a2840;
  --border2:#223050;
  --text:   #7a9ab8;
  --bright: #cde0f5;
  --dim:    #4a6888;
  --cyan:   #00d4f0;
  --purple: #8866ff;
  --green:  #00cc66;
  --pink:   #ff3377;
  --orange: #ff8800;
  --accent: #00d4f0;
  --accent2:#8866ff;
  --accent3:#00cc66;
  --warn:   #ff3377;
}
[data-theme="light"] {
  --bg:     #eef2f7;
  --bg2:    #ffffff;
  --bg3:    #e4eaf2;
  --panel:  #ffffff;
  --border: #c0cfe0;
  --border2:#a0bcd0;
  --text:   #1a3a5c;
  --bright: #0a1e2e;
  --dim:    #6888a8;
  --cyan:   #005580;
  --purple: #3311aa;
  --green:  #004422;
  --pink:   #880033;
  --orange: #773300;
  --accent: #005580;
  --accent2:#3311aa;
  --accent3:#004422;
  --warn:   #880033;
}
[data-theme="light"] body{background:var(--bg);}
[data-theme="light"] svg text{fill:var(--text);}

/* ===== THEME SWITCHER ===== */
.theme-switcher {
  display: flex;
  gap: 2px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 2px;
  flex-shrink: 0;
}
.theme-btn {
  padding: 3px 7px;
  border-radius: 3px;
  font-size: 13px;
  line-height: 1;
  cursor: pointer;
  color: var(--dim);
  border: none;
  background: transparent;
  transition: all 0.15s;
}
.theme-btn:hover { color: var(--cyan); }
.theme-btn.active { background: var(--cyan); color: #000; }



/* ===== HEADER UNIFORME ===== */
header{
  background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:8px 14px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
  flex-wrap:nowrap;
  overflow-x:auto;
}
.back-link{
  font-size:10px;color:var(--dim);text-decoration:none;
  padding:3px 7px;border:1px solid var(--border2);border-radius:3px;
  white-space:nowrap;flex-shrink:0;
}
.back-link:hover{color:var(--cyan);border-color:var(--cyan);}
.logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:16px;
  color:var(--cyan);white-space:nowrap;flex-shrink:0;
}
.logo span{color:var(--dim);}
/* View switcher — toujours après le logo */
.view-switcher{
  display:flex;gap:2px;flex-shrink:0;
}
.view-btn{
  padding:3px 8px;border-radius:3px;font-size:10px;cursor:pointer;
  color:var(--dim);border:1px solid var(--border2);background:transparent;
  font-family:'JetBrains Mono',monospace;text-decoration:none;
  transition:all 0.15s;white-space:nowrap;
}
.view-btn:hover{color:var(--cyan);border-color:var(--cyan);}
.view-btn.current{background:rgba(0,212,240,0.12);border-color:var(--cyan);color:var(--cyan);}
/* Theme switcher — juste après view-switcher */
.theme-switcher{
  display:flex;gap:2px;flex-shrink:0;
  background:var(--bg);border:1px solid var(--border2);border-radius:4px;padding:2px;
}
.theme-btn{
  padding:2px 6px;border-radius:3px;font-size:12px;line-height:1.4;
  cursor:pointer;color:var(--dim);border:none;background:transparent;
  transition:all 0.15s;
}
.theme-btn:hover{opacity:0.8;}
.theme-btn.active{background:var(--cyan);color:#000;}
/* Séparateur flex */
.h-sep{flex:1;}
/* Mode + schema à droite */
.mode-tabs{
  display:flex;gap:2px;background:var(--bg);
  border:1px solid var(--border2);border-radius:4px;padding:2px;flex-shrink:0;
}
.mode-tab{
  padding:3px 9px;border-radius:3px;font-size:10px;cursor:pointer;
  color:var(--dim);border:none;background:transparent;
  font-family:'JetBrains Mono',monospace;transition:all 0.15s;
}
.mode-tab.active{background:var(--cyan);color:#000;font-weight:600;}
.schema-select{
  background:var(--bg);border:1px solid var(--border2);color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:10px;
  padding:3px 5px;border-radius:3px;outline:none;flex-shrink:0;
}
.schema-select:disabled{opacity:0.3;}
.drop-btn{
  padding:3px 9px;border:1px dashed var(--border2);border-radius:3px;
  font-size:10px;cursor:pointer;color:var(--dim);background:transparent;
  position:relative;font-family:'JetBrains Mono',monospace;
  transition:all 0.15s;white-space:nowrap;flex-shrink:0;
}
.drop-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.drop-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
#dropStatus{font-size:10px;color:var(--green);white-space:nowrap;flex-shrink:0;}
#modeLabel{font-size:10px;color:var(--pink);display:none;flex-shrink:0;}

.theme-btn { font-size:0; width:26px; height:26px; display:flex; align-items:center; justify-content:center; }
.theme-btn::before { font-size:0; }
.theme-btn.active::before { background:#000; }

/* Arbre — lisibilité */
.node-name { color: var(--text) !important; font-weight: 600; }
.node-name.dim { color: var(--dim) !important; font-weight: 500; }
.tree-node.present .node-name { color: var(--green) !important; font-weight: 700; }
.tree-node.selected .node-name { color: var(--bright) !important; font-weight: 700; }
.node-icon { color: var(--dim); }
.tree-node.present .node-icon { color: var(--green); }


/* Header textes lisibles */
.back-link, .view-btn:not(.current), .mode-tab:not(.active),
.schema-select, .drop-btn, #dropStatus {
  color: var(--text) !important;
  font-weight: 600;
}

/* Classes sémantiques */
.color-accent  { color: var(--cyan) !important; }
.color-present { color: var(--pink) !important; }
.color-bright  { color: var(--bright) !important; font-weight: 600; }
.color-dim     { color: var(--dim) !important; }
.link-parent   { color: var(--purple); cursor: pointer; font-weight: 600; }
.link-child    { color: var(--green); cursor: pointer; font-weight: 600; }
.link-present  { color: var(--pink); cursor: pointer; font-weight: 600; }

/* Panneau détail lisible */
.detail-content, .detail-content * { color: var(--text); }
.detail-title { color: var(--cyan) !important; font-weight: 700; }
.detail-section-title { color: var(--dim) !important; font-weight: 700; }
.detail-section-body { color: var(--text) !important; font-weight: 600; }
.child-link { color: var(--green) !important; font-weight: 600; }

<div class="main">
  <div class="panel mobile-active" id="panelTree">
    <div class="panel-header">Hiérarchie<div class="count" id="tree-count">–</div></div>

  </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">Tout</button>
      <button class="filter-btn" data-filter="present">IFC</button>
      <button class="filter-btn" data-filter="product">Produits</button>
      <button class="filter-btn" data-filter="relation">Relations</button>
    </div>

  </div>

<script>
// ===== THEME MANAGER v2 =====
const THEME_KEY = 'ifc_theme';

function applyTheme(theme) {
  const root = document.documentElement;
  if (theme === 'system') {
    const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    root.setAttribute('data-theme', dark ? 'dark' : 'light');
  } else {
    root.setAttribute('data-theme', theme);
  }
  // Marquer le bouton correspondant à la sélection réelle (system/dark/light)
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === theme);
  });
  sessionStorage.setItem(THEME_KEY, theme);
}

function initTheme() {
  const saved = sessionStorage.getItem('ifc_theme') || 'system';
  // Appliquer immédiatement
  applyTheme(saved);
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (sessionStorage.getItem('ifc_theme') === 'system') applyTheme('system');
  });
}

// ===== SHARED IFC STATE (sessionStorage) =====
// Clés sessionStorage
const SS_KEY_ENTITIES = 'ifc_entities';
const SS_KEY_VERSION  = 'ifc_version';
const SS_KEY_FILENAME = 'ifc_filename';
const SS_KEY_COUNT    = 'ifc_count';

function saveIFCState(entities, version, filename) {
  try {
    sessionStorage.setItem(SS_KEY_ENTITIES, JSON.stringify(entities));
    sessionStorage.setItem(SS_KEY_VERSION,  version);
    sessionStorage.setItem(SS_KEY_FILENAME, filename);
    sessionStorage.setItem(SS_KEY_COUNT,    Object.keys(entities).length);
  } catch(e) { console.warn('sessionStorage write failed', e); }
}

function loadIFCState() {
  try {
    const entities = JSON.parse(sessionStorage.getItem(SS_KEY_ENTITIES) || 'null');
    const version  = sessionStorage.getItem(SS_KEY_VERSION);
    const filename = sessionStorage.getItem(SS_KEY_FILENAME);
    const count    = sessionStorage.getItem(SS_KEY_COUNT);
    if (!entities) return null;
    return { entities, version, filename, count: parseInt(count) };
  } catch(e) { return null; }
}

function clearIFCState() {
  [SS_KEY_ENTITIES, SS_KEY_VERSION, SS_KEY_FILENAME, SS_KEY_COUNT].forEach(k => sessionStorage.removeItem(k));
}

// ===== CHUNKED IFC PARSER =====
// Lit le fichier par blocs pour éviter de bloquer l'UI
// Retourne { entities, version } via callbacks onProgress(pct) + onDone(result)
function parseIFCChunked(file, onProgress, onDone) {
  const CHUNK = 8 * 1024 * 1024; // 8 MB par chunk
  const total = file.size;
  let offset = 0;
  const entities = {};
  let version = 'ifc4x3';
  let headerRead = false;
  let remainder = '';

  const rx = /=#\d+=\s*(IFC[A-Z0-9]+)\s*\(/g;
  const vRx = /IFC2X3|IFC4X3|IFC4/i;

  function processChunk() {
    if (offset >= total) {
      onDone({ entities, version });
      return;
    }
    const blob = file.slice(offset, offset + CHUNK);
    const reader = new FileReader();
    reader.onload = e => {
      let text = remainder + e.target.result;
      // Détecter version depuis l'en-tête
      if (!headerRead && offset < 2000) {
        const m = text.match(vRx);
        if (m) {
          const v = m[0].toUpperCase();
          version = v === 'IFC2X3' ? 'ifc2x3' : v === 'IFC4X3' ? 'ifc4x3' : 'ifc4';
        }
        headerRead = true;
      }
      // Parser les entités
      let match;
      rx.lastIndex = 0;
      while ((match = rx.exec(text)) !== null) {
        const k = match[1].toUpperCase();
        entities[k] = (entities[k] || 0) + 1;
      }
      // Garder la fin pour le prochain chunk (éviter de couper une ligne)
      const lastNL = text.lastIndexOf('\n');
      remainder = lastNL >= 0 ? text.slice(lastNL + 1) : '';
      offset += CHUNK;
      onProgress(Math.min(99, Math.round((offset / total) * 100)));
      // Yield au browser pour ne pas bloquer l'UI
      setTimeout(processChunk, 0);
    };
    reader.readAsText(blob);
  }
  processChunk();
}


// ===== IFC DROP HANDLING =====
function initIFCDrop(dropEl, fileInputEl, onLoaded) {
  dropEl.addEventListener('dragover', e => { e.preventDefault(); dropEl.classList.add('drag-over'); });
  dropEl.addEventListener('dragleave', () => dropEl.classList.remove('drag-over'));
  dropEl.addEventListener('drop', e => {
    e.preventDefault(); dropEl.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.name.toLowerCase().endsWith('.ifc')) startIFCLoad(f, onLoaded);
  });
  if (fileInputEl) {
    fileInputEl.addEventListener('change', e => {
      if (e.target.files[0]) startIFCLoad(e.target.files[0], onLoaded);
    });
  }
}

function startIFCLoad(file, onLoaded) {
  const modal = document.getElementById('ifcModal');
  const fnEl  = document.getElementById('modalFilename');
  const pctEl = document.getElementById('modalPct');
  const barEl = document.getElementById('modalProgress');
  const stEl  = document.getElementById('modalStatus');

  modal.classList.add('visible');
  fnEl.textContent = file.name;
  pctEl.textContent = '0%';
  barEl.style.width = '0%';
  stEl.textContent = 'Lecture du fichier...';

  parseIFCChunked(file,
    pct => {
      barEl.style.width = pct + '%';
      pctEl.textContent = pct + '%';
      stEl.textContent = pct < 30 ? 'Lecture du fichier...'
        : pct < 70 ? 'Analyse des entités...'
        : 'Finalisation...';
    },
    result => {
      barEl.style.width = '100%';
      pctEl.textContent = '100%';
      stEl.textContent = `✓ ${Object.keys(result.entities).length} types trouvés`;
      saveIFCState(result.entities, result.version, file.name);
      setTimeout(() => {
        modal.classList.remove('visible');
        onLoaded(result);
      }, 600);
    }
  );
}

function updateDropStatus(state) {
  const el = document.getElementById('dropStatus');
  if (!el) return;
  if (state) {
    el.textContent = `◆ ${state.filename.slice(0, 20)} (${state.count} types)`;
    el.style.color = '#00e676';
  } else {
    el.textContent = '';
  }
}



const PSET_URLS = { ifc2x3: 'psets-ifc2x3.json', ifc4: 'psets-ifc4.json', ifc4x3: 'psets-ifc4x3.json' };
const psetCache = {};
async function loadPsetData(v) {
  const url = PSET_URLS[v]; if (!url) return {};
  if (psetCache[v]) return psetCache[v];
  try { const r = await fetch(url); const d = await r.json(); psetCache[v] = d; return d; }
  catch(e) { return {}; }
}

const SCHEMA_URLS={ifc2x3:'schema-ifc2x3.json',ifc4:'schema-ifc4.json',ifc4x3:'schema-ifc4x3.json'};
const schemaCache={};
let mode='schema',currentSchema='ifc4x3',modelEntities={};
let nodes=[],byCode={},childrenMap={},expandedNodes=new Set(),selectedCode=null,currentFilter='all',searchQuery='';

function isMobile(){return window.innerWidth<=640;}

function mobilePanel(p){
  document.querySelectorAll('.mobile-tabs button').forEach((b,i)=>b.classList.toggle('active',['tree','catalog','detail'][i]===p));
  document.getElementById('panelTree').classList.toggle('mobile-active',p==='tree');
  document.getElementById('panelCatalog').classList.toggle('mobile-active',p==='catalog');
  document.getElementById('panelDetail').classList.toggle('mobile-active',p==='detail');
}

function loadSchemaData(v){
  if(schemaCache[v]) return Promise.resolve(schemaCache[v]);
  const sl=document.getElementById('schemaLoading');
  const ll=document.getElementById('schemaLoadingLabel');
  const hideSpinner=()=>{if(sl)sl.classList.remove('visible');};
  if(sl) sl.classList.add('visible');
  if(ll) ll.textContent='Chargement schéma '+v+'...';
  return new Promise((resolve)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('GET', SCHEMA_URLS[v], true);
    xhr.timeout=12000;
    xhr.onload=function(){
      hideSpinner();
      if(xhr.status===200){
        try{ const data=JSON.parse(xhr.responseText); schemaCache[v]=data; resolve(data); }
        catch(e){ resolve([]); }
      } else { resolve([]); }
    };
    xhr.onerror=function(){ hideSpinner(); resolve([]); };
    xhr.ontimeout=function(){ hideSpinner(); resolve([]); };
    xhr.send();
  });
}
function buildIndex(ns){
  nodes=ns;byCode={};childrenMap={};
  ns.forEach(n=>{byCode[n.id]=n;if(!childrenMap[n.id])childrenMap[n.id]=[];if(n.parent){if(!childrenMap[n.parent])childrenMap[n.parent]=[];if(!childrenMap[n.parent].includes(n.id))childrenMap[n.parent].push(n.id);}});
  expandedNodes=new Set();
  getRoots().forEach(r=>{expandedNodes.add(r);(childrenMap[r]||[]).forEach(c=>expandedNodes.add(c));});
}
function getRoots(){return nodes.filter(n=>!n.parent||!byCode[n.parent]).map(n=>n.id);}
function isPresent(c){return !!modelEntities[c.toUpperCase()];}
function getCount(c){return modelEntities[c.toUpperCase()]||0;}
function hasDP(code){if(isPresent(code))return true;return(childrenMap[code]||[]).some(c=>hasDP(c));}

async function setMode(m){
  mode=m;
  document.getElementById('tabSchema').classList.toggle('active',m==='schema');
  document.getElementById('tabIfc').classList.toggle('active',m==='ifc');
  document.getElementById('schemaSelect').disabled=m==='ifc';
  document.getElementById('modeLabel').style.display=m==='ifc'?'block':'none';
  if(m==='schema')await loadSchema(currentSchema);
  else{if(!Object.keys(modelEntities).length){alert('Charger un .ifc d\'abord');setMode('schema');return;}await buildIfcMode();}
}
async function onSchemaChange(){currentSchema=document.getElementById('schemaSelect').value;if(mode==='schema')await loadSchema(currentSchema);}
async function loadSchema(v){const ns=await loadSchemaData(v);buildIndex(ns);selectedCode=null;renderTree();renderGrid();renderDetail(null);}
async function buildIfcMode(){
  const ref=await loadSchemaData(currentSchema);const tmp={};ref.forEach(n=>tmp[n.id]=n);
  const keep=new Set();
  Object.keys(modelEntities).forEach(c=>{let cur=c;while(cur&&tmp[cur]){keep.add(cur);cur=tmp[cur].parent;}});
  buildIndex(ref.filter(n=>keep.has(n.id)));selectedCode=null;renderTree();renderGrid();renderDetail(null);
}

function renderTree(){
  const container=document.getElementById('treeContainer');const q=searchQuery.toLowerCase();const all=Object.values(byCode);
  if(q){
    const m=all.filter(n=>n.id.toLowerCase().includes(q));
    document.getElementById('tree-count').textContent=m.length;
    container.innerHTML=m.map(n=>{const p=isPresent(n.id);const c=getCount(n.id);return`<div class="tree-node ${selectedCode===n.id?'selected':''} ${p?'present':''}" onclick="selectNode('${n.id}')"><div class="tree-indent" style="width:8px"></div><div class="node-icon">${p?'◆':'◇'}</div><div class="node-name">${n.id}</div>${c?`<div class="node-count">${c}</div>`:''}</div>`;}).join('');return;
  }
  document.getElementById('tree-count').textContent=all.length;
  let html='';
  function rn(code,depth){
    const n=byCode[code];if(!n)return;const kids=childrenMap[code]||[];const isE=expandedNodes.has(code);
    const p=isPresent(code);const c=getCount(code);const hk=kids.length>0;
    html+=`<div class="tree-node ${selectedCode===code?'selected':''} ${p?'present':''}" onclick="selectNode('${code}')">
      <div class="tree-indent" style="width:${depth*10}px"></div>
      <div class="tree-toggle" onclick="event.stopPropagation();toggleNode('${code}')">${hk?(isE?'▾':'▸'):''}</div>
      <div class="node-icon">${p?'◆':(hasDP(code)?'◈':'◇')}</div>
      <div class="node-name ${!hk&&!p?'dim':''}">${code}</div>
      ${c?`<div class="node-count">${c}</div>`:''}
    </div>`;
    if(hk&&isE)kids.forEach(k=>rn(k,depth+1));
  }
  getRoots().forEach(r=>rn(r,0));container.innerHTML=html;
}
function toggleNode(code){expandedNodes.has(code)?expandedNodes.delete(code):expandedNodes.add(code);renderTree();}
async function selectNode(code){
  selectedCode=code;renderTree();await renderDetail(code);showGridForNode(code);
  if(isMobile())mobilePanel('detail');
}
function isDescOf(code,anc){let cur=byCode[code];while(cur&&cur.parent){if(cur.parent===anc)return true;cur=byCode[cur.parent];}return false;}
function showGridForNode(code){
  const kids=childrenMap[code]||[];
  const items=kids.length>0?kids.map(k=>byCode[k]).filter(Boolean):[byCode[code]].filter(Boolean);
  const grid=document.getElementById('entityGrid');const empty=document.getElementById('centerEmpty');
  if(!items.length)return;
  empty.style.display='none';grid.style.display='grid';
  document.getElementById('catalog-count').textContent=items.length;
  grid.innerHTML=items.map(n=>{const p=isPresent(n.id);const c=getCount(n.id);const kk=(childrenMap[n.id]||[]).length;return`<div class="entity-card ${selectedCode===n.id?'selected-card':''} ${p?'present-card':''}" onclick="selectNode('${n.id}')"><div class="ec-name">${n.id}</div><div class="ec-parent">${kk} enfants</div>${c?`<div class="ec-count">${c} inst.</div>`:''}</div>`;}).join('');
}
function renderGrid(filter){
  filter=filter||currentFilter;const grid=document.getElementById('entityGrid');const empty=document.getElementById('centerEmpty');
  let items=Object.values(byCode);
  if(filter==='present')items=items.filter(n=>isPresent(n.id));
  else if(filter==='product')items=items.filter(n=>n.id==='IfcProduct'||isDescOf(n.id,'IfcProduct'));
  else if(filter==='relation')items=items.filter(n=>n.id==='IfcRelationship'||isDescOf(n.id,'IfcRelationship'));
  if(!items.length&&filter==='present'){empty.style.display='flex';grid.style.display='none';empty.innerHTML='<div class="big">◇</div><div>Charger un .ifc</div>';return;}
  empty.style.display='none';grid.style.display='grid';
  document.getElementById('catalog-count').textContent=items.length;
  grid.innerHTML=items.map(n=>{const p=isPresent(n.id);const c=getCount(n.id);return`<div class="entity-card ${p?'present-card':''}" onclick="selectNode('${n.id}')"><div class="ec-name">${n.id}</div><div class="ec-parent">↳${n.parent||'racine'}</div>${c?`<div class="ec-count">${c} inst.</div>`:''}</div>`;}).join('');
}
function bpChain(code){const chain=[];let cur=byCode[code];while(cur&&cur.parent){chain.unshift(cur.parent);cur=byCode[cur.parent];}return chain;}
async function renderDetail(code) {
  const d = document.getElementById('detailContent');
  if (!code || !byCode[code]) { d.innerHTML = '<div class="detail-empty">Cliquer sur une entité</div>'; return; }
  const n = byCode[code]; const chain = bpChain(code); const kids = childrenMap[code] || []; const cnt = getCount(code);
  const doc = currentSchema === 'ifc2x3' ? `https://standards.buildingsmart.org/IFC/RELEASE/IFC2x3/TC1/HTML/ifckernel/lexical/${code.toLowerCase()}.htm`
    : currentSchema === 'ifc4' ? `https://standards.buildingsmart.org/IFC/RELEASE/IFC4/ADD2_TC1/HTML/link/${code.toLowerCase()}.htm`
    : `https://ifc43-docs.standards.buildingsmart.org/IFC/RELEASE/IFC4x3/HTML/lexical/${code}.htm`;

  const psetData = await loadPsetData(currentSchema);
  const cd = psetData[code] || {};
  const attrs = cd.a || []; const psets = cd.p || {}; const qtos = cd.q || {};

  const tl = t => {
    if(t==='str') return '<span style="color:#5a7080">string</span>';
    if(t==='num') return '<span style="color:#ff9100">number</span>';
    if(t==='bool') return '<span style="color:#76ff03">boolean</span>';
    if(t==='int') return '<span style="color:#ff9100">integer</span>';
    if(t.startsWith('ref:')) return `<span style="color:#7c4dff">${t.slice(4)}</span>`;
    if(t.startsWith('enum:')) { const v=t.slice(5).split(',').slice(0,4); return `<span style="color:#e040fb">enum</span> <span style="color:#283849;font-size:8px">${v.join('|')}…</span>`; }
    return `<span style="color:#5a7080">${t}</span>`;
  };

  d.innerHTML = `
    <div class="detail-title">${code}</div>
    <div class="detail-parent-chain">${chain.map(p=>`<a onclick="selectNode('${p}')">${p}</a>`).join(' › ')}${chain.length?' › ':''}${code}</div>
    ${cnt ? `<div class="instance-badge">◆ ${cnt} instance${cnt>1?'s':''}</div>` : ''}
    ${n.def ? `<div class="detail-section"><div class="detail-section-title">Définition</div><div class="detail-section-body">${n.def.slice(0,280)}…</div></div>` : ''}

    ${attrs.length ? `<div class="detail-section"><div class="detail-section-title">Attributs (${attrs.length})</div><div class="detail-section-body">
      <table style="width:100%;border-collapse:collapse;">
        ${attrs.map(a=>`<tr style="border-bottom:1px solid var(--border)">
          <td style="padding:2px 0;color:${a.o?'var(--text-dim)':'var(--text-bright)'};font-size:9px;width:55%">${a.o?'':'<span style="color:var(--warn)">!</span> '}${a.n}</td>
          <td style="padding:2px 0;font-size:9px">${tl(a.t)}</td>
        </tr>`).join('')}
      </table>
    </div></div>` : ''}

    ${Object.keys(psets).length ? `<div class="detail-section"><div class="detail-section-title">PSET (${Object.keys(psets).length})</div><div class="detail-section-body">
      ${Object.entries(psets).map(([pn,pp])=>`<div style="margin-bottom:6px">
        <div style="color:var(--accent);font-size:9px;font-weight:600;margin-bottom:2px">${pn}</div>
        ${pp.map(p=>`<div style="padding:1px 0 1px 6px;border-left:1px solid var(--border)">
          <span style="color:var(--text-bright);font-size:9px">${p.n}</span>
          ${p.k?`<span style="color:#e040fb;font-size:8px"> [${p.k}]</span>`:''}
          ${p.d?`<div style="color:var(--text-dim);font-size:8px">${p.d}</div>`:''}
        </div>`).join('')}
      </div>`).join('')}
    </div></div>` : ''}

    ${Object.keys(qtos).length ? `<div class="detail-section"><div class="detail-section-title">QTO</div><div class="detail-section-body">
      ${Object.entries(qtos).map(([qn,qp])=>`<div style="margin-bottom:6px">
        <div style="color:#ff9100;font-size:9px;font-weight:600;margin-bottom:2px">${qn}</div>
        ${qp.map(p=>`<div style="padding:1px 0 1px 6px;border-left:1px solid var(--border)">
          <span style="color:var(--text-bright);font-size:9px">${p.n}</span>
          ${p.d?`<div style="color:var(--text-dim);font-size:8px">${p.d}</div>`:''}
        </div>`).join('')}
      </div>`).join('')}
    </div></div>` : ''}

    ${kids.length ? `<div class="detail-section"><div class="detail-section-title">Sous-types (${kids.length})</div><div class="detail-section-body">
      ${kids.map(k=>{const kc=getCount(k);return`<a class="child-link" onclick="selectNode('${k}')">${isPresent(k)?'◆':'◇'} ${k}${kc?` <span style="color:var(--accent3)">(${kc})</span>`:''}</a>`;}).join('')}
    </div></div>` : ''}

    ${n.parent && byCode[n.parent] ? `<div class="detail-section"><div class="detail-section-title">Parent</div><div class="detail-section-body"><a class="child-link" onclick="selectNode('${n.parent}')">↑ ${n.parent}</a></div></div>` : ''}
    <a href="${doc}" target="_blank" class="doc-link">↗ Documentation</a>`;
}
document.querySelectorAll('.filter-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentFilter=btn.dataset.filter;renderGrid(currentFilter);});});
document.getElementById('treeSearch').addEventListener('input',e=>{searchQuery=e.target.value.trim();renderTree();});
initIFCDrop(
  document.getElementById('dropZone'),
  document.getElementById('fileInput'),
  result => {
    modelEntities = result.entities;
    currentSchema = result.version;
    document.getElementById('schemaSelect').value = currentSchema;
    updateDropStatus({ filename: result.filename || sessionStorage.getItem('ifc_filename'), count: Object.keys(result.entities).length });
    setMode('ifc');
  }
);
(function restoreIFC() {
  const state = loadIFCState();
  if (!state) return;
  modelEntities = state.entities;
  currentSchema = state.version || 'ifc4x3';
  document.getElementById('schemaSelect').value = currentSchema;
  updateDropStatus(state);
  setTimeout(() => setMode('ifc'), 100);
})();
applyTheme(sessionStorage.getItem('ifc_theme')||'system');
loadSchema('ifc4x3');
</script>
</body>
</html>
